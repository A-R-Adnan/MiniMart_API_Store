<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="bg-slate-100 min-h-screen  text-slate-900">
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200">
        <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <h1 class="font-bold text-2xl">MiniMart</h1>
            <button id="navCartBtn"
                class="text-slate-700 font-bold hover:cursor-pointer border rounded-lg px-4 py-2 hover:bg-slate-100 flex items-center gap-2">Cart<span
                    id="cartCount"
                    class="inline-block rounded-full bg-slate-900 text-white text-xs px-2 py-0.5">0</span></button>
        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-8">
        <section id="controlsSection" class="mb-6">
            <div class="controlSection grid md:grid-cols-12 gap-4">
                <input type="text" id="searchInput"
                    class="md:col-span-6 w-full border border-slate-300 rounded-lg bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100"
                    placeholder="Search products...">
                <select id="categoryFilter"
                    class="md:col-span-3 w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                    <option value="all" selected>All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="jewelery">Jewelery</option>
                    <option value="men's clothing">Men's Clothing</option>
                    <option value="women's clothing">Women's Clothing</option>
                </select>
                <select id="sortSelect"
                    class="md:col-span-3 w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                    <option value="default" selected>Default sorting</option>
                    <option value="lowToHigh">Low to High</option>
                    <option value="highToLow">High to Low</option>
                </select>
            </div>
        </section>
        <section id="statusMessages" class="mb-6 text-center">
            <p id="loadingMessage" class="hidden text-slate-500 font-medium py-4">loading message...</p>
            <p id="errorMessage"
                class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 font-medium">Something
                went wrong</p>
            <p id="emptyMessage" class="hidden text-slate-500 font-medium py-4">No products found</p>
        </section>
        <section id="productSection">
            <div id="productGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <article class="productCard bg-white rounded-xl border border-slate-200 p-4 transition hover:shadow-md">
                    <img src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="Product Image" class="productImage h-40 w-full object-contain mx-auto">
                    <div class="content space-y-2 mt-4">
                        <h3 class="productTitle font-semibold text-sm leading-5">Title</h3>
                        <p class="productCategory inline-flex rounded-full bg-slate-100 text-slate-600 text-xs px-2 py-1">Category</p>
                        <p class="productPrice text-lg font-bold text-slate-900">$90.00</p>
                        <div class="productCardBtn flex gap-2">
                            <button class="detailsBtn font-medium flex-1 border rounded-lg px-3 py-2 bg-blue-50 text-blue-900 hover:bg-blue-100 border-blue-500 hover:cursor-pointer text-sm">Details</button>
                            <button class="addToCartBtn flex-1 border font-medium text-white border-emerald-300 rounded-lg px-3 py-2 bg-emerald-400 hover:bg-emerald-500 hover:cursor-pointer text-sm">Add to Cart</button>
                        </div>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <div id="productOverlay">
        <div class="modalContent">
            <button id="closeModalBtn">Close</button>
            <img id="modalImage" src="" alt="Product Image">
            <h3 id="modalTitle">Title</h3>
            <h4 id="modalCategory">Category</h4>
            <p id="modalDescription">Description...</p>
            <p id="modalPrice">Price</p>
            <button id="modalAddToCartBtn">Add to Cart</button>
        </div>
    </div>
    <div id="cartOverlay">
        <div id="cartSidebar">
            <div id="cartHeader">
                <h3>Cart</h3>
                <button id="closeCartBtn">Close</button>
            </div>
            <div id="cartItemsContainer">
                <div class="cartItem">
                    <h3>Product Title</h3>
                    <p>Qty: <span>1</span></p>
                    <p>$10</p>
                    <button>Remove</button>
                </div>
            </div>
            <div id="cartFooter">
                <p>Total: <span id="cartTotalPrice">$100</span></p>
                <button>Checkout</button>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
