<!DOCTYPE html>

<head>

    <title>MiniMart</title>

<body class="bg-slate-100 min-h-screen  text-slate-900">
    <header class="sticky top-0 z-40 bg-white border-b border-slate-200">
        <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
            <h1 class="font-bold text-2xl">MiniMart</h1>
            <button id="navCartBtn"
                class="text-slate-700 font-bold hover:cursor-pointer border rounded-lg px-4 py-2 hover:bg-slate-100 flex items-center gap-2">Cart<span
                    id="cartCount"
                    class="inline-block rounded-full bg-slate-900 text-white text-xs px-2 py-0.5">0</span></button>
        </nav>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-8">
        <section id="controlsSection" class="mb-6">
            <div class="controlSection grid md:grid-cols-12 gap-4">
                <input type="text" id="searchInput" class="md:col-span-6 w-full border border-slate-300 rounded-lg bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100" placeholder="Search products...">
                <select id="categoryFilter" class="md:col-span-3 w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                    <option value="all" selected>All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="jewelery">Jewelery</option>
                    <option value="men's clothing">Men's Clothing</option>
                    <option value="women's clothing">Women's Clothing</option>
                </select>
                <select id="sortSelect" class="md:col-span-3 w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                    <option value="default" selected>Default sorting</option>
                    <option value="lowToHigh">Low to High</option>
                    <option value="highToLow">High to Low</option>
                </select>
            </div>
        </section>
        <section id="statusMessages" class="mb-6 text-center">
            <p id="loadingMessage" class="hidden text-slate-500 font-medium py-4">loading message...</p>
            <p id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-3 font-medium">Something
                went wrong</p>
            <p id="emptyMessage" class="hidden text-slate-500 font-medium py-4">No products found</p>
        </section>
        <section id="productSection">
            <div id="productGrid" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">

                    </div>
                </article> -->

        </section>

            <img class=" h-56 md:h-64 w-full object-contain" id="modalImage" src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="Product Image">

    <div id="cartOverlay" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex justify-end">
        <div id="cartSidebar" class="bg-white h-full w-full max-w-sm shadow-xl flex flex-col">
            <div id="cartHeader" class="flex justify-between items-center p-4 border-b border-slate-200">
                <h3 class="text-xl font-bold tracking-wide">Cart</h3>
                <button id="closeCartBtn" class="w-8 h-8 font-semibold border border-slate-200 rounded-full flex items-center justify-center bg-slate-50 hover:bg-slate-100 cursor-pointer">X</button>
            </div>
            <div id="cartItemsContainer" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="cartItem space-y-2 border border-slate-200 rounded-lg p-4">
                    <h3 class="text-sm font-semibold text-slate-900">Product Title</h3>
                    <p class="text-sm text-slate-500">Qty: <span>1</span></p>
                    <div class="flex justify-between">
                        <p class="font-semibold text-slate-900">$10</p>
                        <button class="text-sm font-medium text-red-600 hover:text-red-700 hover:underline cursor-pointer">Remove</button>
                    </div>
                </div>
            </div>
            <div id="cartFooter" class="border-t border-slate-200 p-4 space-y-4">
                <p class="flex justify-between font-semibold text-lg"><span>Total :</span> <span id="cartTotalPrice">$100</span></p>
                <button class="w-full font-medium text-white rounded-lg px-4 py-2.5 bg-emerald-500 hover:bg-emerald-600 hover:cursor-pointer text-sm">Checkout</button>
            </div>
